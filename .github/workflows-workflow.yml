name: Deploy to Nexus

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to Nexus via SSH
        uses: appleboy/ssh-action@v0.1.0
        with:
          host: ${{ secrets.NEXUS_HOST }}
          username: ${{ secrets.NEXUS_USER }}
          key: ${{ secrets.NEXUS_SSH_KEY }}
          port: ${{ secrets.NEXUS_SSH_PORT }}
          script: |
            cd ~/EmberGalaxies
            git pull origin develop
            echo "${{ secrets.NEXUS_SUDO_PASS }}" | sudo -S docker compose -f docker-compose.prod.yml up -d --build
