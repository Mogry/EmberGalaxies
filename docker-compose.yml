services:
  postgres:
    image: postgres:16-alpine
    container_name: ember-galaxies-db
    environment:
      POSTGRES_USER: ember
      POSTGRES_PASSWORD: galaxies
      POSTGRES_DB: ember_galaxies
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ember -d ember_galaxies"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: ember-galaxies-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data: