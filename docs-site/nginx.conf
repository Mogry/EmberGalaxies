server {
    listen 80;
    server_name docs.alcedoflow.cloud;

    root /usr/share/nginx/html;
    index index.html;

    # VitePress SPA routing
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}